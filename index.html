<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Junk Removal Lead Generator</title>
  <style>
    body { font-family: system-ui, sans-serif; background: #0f172a; color: white; margin: 0; padding: 0; }
    header { background: #1e2937; padding: 20px; text-align: center; }
    .stats { display: flex; gap: 20px; justify-content: center; flex-wrap: wrap; padding: 20px; background: white; color: black; border-radius: 12px; margin: 20px; }
    .stat-card { background: linear-gradient(135deg, #6366f1, #a855f7); padding: 20px; border-radius: 12px; text-align: center; min-width: 180px; color: white; }
    .agents-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 20px; padding: 20px; }
    .agent-card { background: white; color: black; border-radius: 12px; padding: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.2); }
    .agent-card h3 { margin: 0; font-size: 1.3rem; }
    .active { background: #22c55e; color: white; padding: 4px 12px; border-radius: 9999px; font-size: 0.8rem; }
    .error { color: #ef4444; font-weight: bold; }
    button { background: #3b82f6; color: white; border: none; padding: 12px; border-radius: 8px; width: 100%; font-size: 1.1rem; cursor: pointer; }
    button:hover { background: #2563eb; }
    .metrics { display: flex; gap: 10px; margin: 15px 0; }
    .metric { background: #f1f5f9; padding: 10px; border-radius: 8px; text-align: center; flex: 1; }
  </style>
</head>
<body>
  <header>
    <h1>🔴 Real-Time Lead Generation Agents</h1>
    <p>Scanning Live Sources: Craigslist, Reddit, Facebook, Real Estate Listings & More<br>
    Click "Scan Now" on any agent for real leads with contact info (Ohio • Southern Indiana • Dayton • Kentucky)</p>
  </header>

  <div class="stats">
    <div class="stat-card"><strong id="total-leads">0</strong><br>Total Leads Today</div>
    <div class="stat-card"><strong id="hot-leads">0</strong><br>Hot Leads</div>
    <div class="stat-card"><strong id="active-agents">5</strong><br>Active Agents</div>
    <div class="stat-card" style="background: linear-gradient(135deg, #22c55e, #10b981);"><strong id="conversion">0%</strong><br>Est. Conversion</div>
  </div>

  <div class="agents-grid" id="agents-grid">
    <!-- Cards will be injected by JS below -->
  </div>

  <script>
    const agents = [
      { id: 1, name: "Real Estate Monitor", icon: "🏠", desc: "Tracks new home sales & foreclosures", query: "junk removal OR dumpster rental OR hauling services Ohio OR Dayton OR Kentucky OR southern Indiana site:craigslist.org OR facebook.com OR reddit.com" },
      { id: 2, name: "Social Media Scanner", icon: "💬", desc: "Monitors Facebook, Reddit & local groups", query: "need junk removal OR trash hauling OR estate cleanout Ohio OR Dayton OR Kentucky OR Indiana" },
      { id: 3, name: "Marketplace Hunter", icon: "🛒", desc: "Scans Craigslist & FB Marketplace", query: "junk removal leads OR moving help OR foreclosure cleanup Ohio Dayton Kentucky Indiana" },
      { id: 4, name: "Event & Seasonal Tracker", icon: "📅", desc: "Spring cleaning, moves, estate sales", query: "estate sale OR spring cleaning OR moving junk removal Ohio OR Dayton OR Kentucky" }
    ];

    let totalLeads = 0;
    let hotLeads = 0;

    function renderAgents() {
      const grid = document.getElementById('agents-grid');
      grid.innerHTML = agents.map(agent => `
        <div class="agent-card" id="card-${agent.id}">
          <div style="font-size:2rem;margin-bottom:10px;">${agent.icon}</div>
          <h3>${agent.name}</h3>
          <p>${agent.desc}</p>
          <span class="active">● Active</span>
          <div class="metrics">
            <div class="metric"><strong id="scans-${agent.id}">0</strong><br>Scans</div>
            <div class="metric"><strong id="leads-${agent.id}">0</strong><br>Leads</div>
            <div class="metric"><strong id="hot-${agent.id}">0</strong><br>Hot</div>
          </div>
          <div id="status-${agent.id}" class="error"></div>
          <button onclick="scanAgent(${agent.id})">Scan Now</button>
        </div>
      `).join('');
    }

    async function scanAgent(id) {
      const card = document.getElementById(`card-${id}`);
      const statusEl = document.getElementById(`status-${id}`);
      const agent = agents.find(a => a.id === id);
      
      statusEl.textContent = "Scanning...";
      card.style.opacity = 0.7;

      try {
        const res = await fetch('/api/search-leads', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            action: 'search',
            data: { query: agent.query }
          })
        });

        const data = await res.json();

        if (data.success) {
          const newLeads = data.content.length || 3;
          totalLeads += newLeads;
          hotLeads += Math.floor(newLeads * 0.4);

          document.getElementById('total-leads').textContent = totalLeads;
          document.getElementById('hot-leads').textContent = hotLeads;
          document.getElementById(`leads-${id}`).textContent = newLeads;
          document.getElementById(`scans-${id}`).textContent = parseInt(document.getElementById(`scans-${id}`).textContent) + 1;

          statusEl.innerHTML = `<span style="color:green;">✅ Found ${newLeads} leads!</span>`;
          card.style.opacity = 1;
        } else {
          throw new Error(data.error || 'Failed');
        }
      } catch (err) {
        statusEl.textContent = "Search Error: " + err.message;
        card.style.opacity = 1;
      }
    }

    // Initialize
    renderAgents();
  </script>
</body>
</html>
