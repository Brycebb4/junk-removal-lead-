<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Junk Removal Lead Generator</title>
    <style>
        /* (your existing styles — unchanged) */
        .scan-status { font-size: 0.85em; margin-top: 8px; color: #27ae60; font-weight: 600; }
    </style>
</head>
<body>
    <!-- (your header, summary, modal with templates — unchanged) -->
    <!-- ... (keep everything exactly as you have it now) ... -->

    <div class="agents-grid" id="agentsGrid"></div>

    <script>
        // ... (your existing agents object, currentLead, templates, loadData, saveData, renderLeadsForAgent, showLeadModal, textLead, emailLead, copyCallTextScript — all unchanged) ...

        function renderAgents() {
            const grid = document.getElementById('agentsGrid'); grid.innerHTML = '';
            Object.keys(agents).forEach(key => {
                const a = agents[key];
                const card = document.createElement('div'); card.className = 'agent-card';
                card.innerHTML = `
                    <div class="agent-header"><div class="agent-icon">${a.icon}</div><div><h3>${a.name}</h3><span style="background:#d4edda;color:#155724;padding:5px 12px;border-radius:20px;font-size:0.8em;">Active</span></div></div>
                    <div class="metrics">... (your metrics) ...</div>
                    <button class="btn" onclick="scanAgent('${key}')">Scan Now</button>
                    <div class="scan-status" id="${key}-status">Last scanned: Never</div>
                    <div class="leads-section" id="${key}-leads-section"></div>
                `;
                grid.appendChild(card);
                renderLeadsForAgent(key);
            });
            updateGlobalSummary();
        }

        async function scanAgent(key) {
            const statusEl = document.getElementById(`${key}-status`);
            statusEl.textContent = "Scanning live sources...";
            statusEl.style.color = "#f39c12";

            try {
                await fetch('/trigger-all');
                const res = await fetch('/api/leads');
                const backendData = await res.json();
                
                Object.keys(agents).forEach(k => {
                    if (backendData[k]) agents[k].leadsList = backendData[k];
                });
                
                saveData();
                renderAgents();   // this refreshes ALL statuses
                
                // Message now appears UNDER "Last scanned:" instead of popup
                Object.keys(agents).forEach(k => {
                    const el = document.getElementById(`${k}-status`);
                    const count = agents[k].leadsList.length;
                    el.textContent = count > 0 
                        ? `Scanned just now — ${count} real leads added` 
                        : `Scanned just now — 0 leads (try again in 5 min)`;
                    el.style.color = count > 0 ? "#27ae60" : "#e74c3c";
                });
            } catch(e) {
                const el = document.getElementById(`${key}-status`);
                el.textContent = "Scan failed — check Render logs (API keys?)";
                el.style.color = "#e74c3c";
            }
        }

        // ... (rest of your script unchanged) ...
        renderAgents();
        loadData();
        updateGlobalSummary();
    </script>
</body>
</html>
