<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Junk Removal Lead Generation System</title>
    <meta name="description" content="Real-time lead generation agents for junk removal services in Cincinnati and Dayton">
    <style>
        /* Your entire <style> section stays exactly the same – no changes needed */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif; background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%); min-height: 100vh; padding: 20px; }
        .container { max-width: 1400px; margin: 0 auto; }
        /* ... (all your CSS is kept 100% unchanged) ... */
        @media (max-width: 768px) { .agents-grid { grid-template-columns: 1fr; } .header h1 { font-size: 1.8em; } }
    </style>
</head>
<body>
    <!-- Your entire <body> HTML is unchanged – all agents, modal, etc. stay the same -->
    <div class="container">
        <div class="header">
            <h1>🎯 Real-Time Lead Generation Agents</h1>
            <p>Scanning Live Sources: Craigslist, Reddit, Facebook, Real Estate Listings & More</p>
            <p style="font-size: 0.9em; opacity: 0.8; margin-top: 5px;">Click "Scan Now" on any agent to search for real leads with actual contact information</p>
        </div>

        <!-- Dashboard summary and all 5 agent cards stay exactly the same -->
        <div class="dashboard-summary"> ... </div>
        <div class="agents-grid"> ... (all 5 cards) ... </div>
    </div>

    <!-- Lead Detail Modal stays exactly the same -->
    <div class="modal-overlay" id="leadModal"> ... </div>

    <script>
        let currentLead = null;
        
        const agentData = {
            agent1: { scans: 0, leads: 0, hot: 0, leadsList: [] },
            agent2: { scans: 0, leads: 0, hot: 0, leadsList: [] },
            agent3: { scans: 0, leads: 0, hot: 0, leadsList: [] },
            agent4: { scans: 0, leads: 0, hot: 0, leadsList: [] },
            agent5: { scans: 0, leads: 0, hot: 0, leadsList: [] }
        };

        const agentConfig = {
            agent1: { name: "Real Estate Monitor", searchQueries: ["estate sale OR foreclosure cleanout Oxford Miami University Harrison Ross Shandon", "house cleanout Okeana Collinsville Darrtown Somerville Jacksonburg West Elkton", "moving junk removal Lawrenceburg Guilford Wrights Corner Greendale Hidden Valley"] },
            agent2: { name: "Social Media Scanner", searchQueries: ["site:reddit.com OR site:facebook.com junk removal OR cleanout Oxford OR Miami University OR Harrison OR Ross", "Lawrenceburg Indiana OR Guilford OR Wrights Corner OR Petersburg OR Greendale junk removal needed", "Shandon Okeana Collinsville Darrtown Somerville West Elkton moving help"] },
            agent3: { name: "Marketplace Hunter", searchQueries: ["Craigslist OR FB Marketplace Oxford OR Harrison OR Ross free stuff must go junk removal", "Okeana Collinsville Darrtown Somerville Jacksonburg Astoria West Elkton estate sale cleanup", "Morning Sun Lawrenceburg Guilford Wrights Corner Wilmington Petersburg Greendale Hidden Valley junk"] },
            agent4: { name: "Event & Seasonal Tracker", searchQueries: ["Miami University Oxford student move out junk removal spring 2026", "Harrison Ross Shandon spring cleaning services needed contact", "Lawrenceburg Indiana Guilford Wrights Corner Wilmington moving junk removal"] },
            agent5: { name: "Commercial Monitor", searchQueries: ["Oxford Harrison business closing office furniture removal cleanout", "Wilmington Petersburg Greendale Hidden Valley commercial liquidation", "Lawrenceburg Indiana retail store closure junk removal"] }
        };

        async function scanAgent(agentId) {
            const section = document.getElementById(`${agentId}-leads-section`);
            section.innerHTML = '<div class="loading"><div class="spinner"></div>🔍 Searching the web for real leads...</div>';

            const config = agentConfig[agentId];
            try {
                const leads = [];
                for (let i = 0; i < config.searchQueries.length; i++) {
                    const query = config.searchQueries[i];
                    section.innerHTML = `<div class="loading"><div class="spinner"></div>🌐 Searching: ${query.substring(0, 40)}... (${i + 1}/${config.searchQueries.length})</div>`;
                    
                    const searchResults = await performWebSearch(query);
                    if (searchResults && searchResults.content) {
                        section.innerHTML = `<div class="loading"><div class="spinner"></div>🤖 Analyzing results (${i + 1}/${config.searchQueries.length})...</div>`;
                        const extractedLeads = await extractLeadsFromResults(searchResults, query);
                        leads.push(...extractedLeads);
                    }
                    await new Promise(resolve => setTimeout(resolve, 1000));
                }

                const uniqueLeads = deduplicateLeads(leads).slice(0, 5);
                if (uniqueLeads.length === 0) {
                    section.innerHTML = `<div class="loading" style="color: #e67e22;"><strong>No leads found in this scan.</strong><br><small>Try again later or scan a different agent.</small></div>`;
                    return;
                }

                agentData[agentId].scans++;
                agentData[agentId].leads += uniqueLeads.length;
                agentData[agentId].hot += uniqueLeads.filter(l => l.urgency >= 7).length;
                agentData[agentId].leadsList = uniqueLeads;

                updateAgentMetrics(agentId);
                displayLeads(agentId, uniqueLeads);
                updateDashboard();
            } catch (error) {
                console.error("Scan error:", error);
                section.innerHTML = `<div class="loading" style="color: #e74c3c;"><strong>Search Error</strong><br><small>${error.message || 'Unable to complete search'}</small></div>`;
            }
        }

        async function performWebSearch(query) {
            const response = await fetch('/api/search-leads', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    action: 'search',
                    data: { 
                        query: `Junk removal, cleanout, estate sale, move out help, foreclosure cleanout, or free stuff must go in Oxford Ohio, Miami University area, Harrison, Ross, Shandon, Okeana, Collinsville, Darrtown, Somerville, Jacksonburg, Astoria, West Elkton, Morning Sun, Lawrenceburg Indiana, Guilford, Wrights Corner, Wilmington, Petersburg, Greendale, Hidden Valley, New Haven. ${query}. Find real posts with phone numbers, emails, addresses, or "call for details".`
                    }
                })
            });
            return await response.json();
        }

        async function extractLeadsFromResults(searchData, query) {
            const response = await fetch('/api/search-leads', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    action: 'extract',
                    data: {
                        messages: [
                            { role: "user", content: `Extract 1-3 real leads for Junk Removal Guys from these search results for "${query}". Return ONLY a valid JSON array with fields: contactName, phone, email, title, location, details, urgency (1-10), estimatedValue, source, sourceUrl, nextSteps. Return [] if no good leads.` },
                            { role: "assistant", content: JSON.stringify(searchData.content) },
                            { role: "user", content: "Return only the JSON array:" }
                        ]
                    }
                })
            });

            const data = await response.json();
            let text = data.content?.[0]?.text || data.content?.[0]?.message?.content || '[]';
            text = text.replace(/```json|```/g, '').trim();

            try {
                return JSON.parse(text) || [];
            } catch (e) {
                console.error("JSON parse failed:", text);
                return [];
            }
        }

        function deduplicateLeads(leads) {
            const seen = new Set();
            return leads.filter(lead => {
                const key = `${lead.title}-${lead.location}`.toLowerCase();
                if (seen.has(key)) return false;
                seen.add(key);
                return true;
            });
        }

        function displayLeads(agentId, leads) {
            const section = document.getElementById(`${agentId}-leads-section`);
            let html = '<div class="mode-badge mode-real">🌐 Real Web Search Results</div><h4 style="margin: 10px 0;">Leads Found:</h4>';
            leads.forEach(lead => {
                const scoreClass = lead.urgency >= 7 ? 'Hot Lead' : 'Warm Lead';
                html += `
                    <div class="lead-item" onclick='openLeadModal(${JSON.stringify(lead).replace(/'/g, "&apos;")})'>
                        <div class="lead-title">${lead.title}</div>
                        <div class="lead-details">👤 ${lead.contactName || 'Contact Available'}</div>
                        <div class="lead-details">📍 ${lead.location}</div>
                        <div style="margin-top: 8px;">
                            <span class="lead-score">Score: ${lead.urgency}/10 - ${scoreClass}</span>
                            <span class="lead-score" style="background: #fff3cd; color: #856404; margin-left: 5px;">${lead.estimatedValue}</span>
                        </div>
                        <div style="margin-top: 8px; font-size: 0.85em; color: #7f8c8d;">Click to view contact info →</div>
                    </div>
                `;
            });
            section.innerHTML = html;
        }

        function updateAgentMetrics(agentId) {
            const data = agentData[agentId];
            document.getElementById(`${agentId}-scans`).textContent = data.scans;
            document.getElementById(`${agentId}-leads`).textContent = data.leads;
            document.getElementById(`${agentId}-hot`).textContent = data.hot;
        }

        function updateDashboard() {
            let totalLeads = 0, totalHot = 0;
            Object.values(agentData).forEach(agent => { totalLeads += agent.leads; totalHot += agent.hot; });
            document.getElementById('totalLeads').textContent = totalLeads;
            document.getElementById('hotLeads').textContent = totalHot;
            const conversionRate = totalLeads > 0 ? Math.round((totalHot / totalLeads) * 100) : 0;
            document.getElementById('conversionRate').textContent = conversionRate + '%';
        }

        function openLeadModal(lead) { /* unchanged */ currentLead = lead; /* ... all modal code ... */ }
        function closeModal() { /* unchanged */ }
        function callLead() { /* unchanged */ }
        function emailLead() { /* unchanged */ }
        function textLead() { /* unchanged */ }
        function markLeadContacted() { /* unchanged */ }

        document.getElementById('leadModal').addEventListener('click', function(e) {
            if (e.target === this) closeModal();
        });
    </script>
</body>
</html>
