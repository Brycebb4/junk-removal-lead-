<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Junk Removal Lead Generator</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%); min-height: 100vh; padding: 20px; color: #333; }
        .container { max-width: 1400px; margin: 0 auto; }
        .header { text-align: center; color: white; margin-bottom: 30px; }
        .header h1 { font-size: 2.5em; text-shadow: 2px 2px 4px rgba(0,0,0,0.3); }
        .dashboard-summary { background: white; border-radius: 15px; padding: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); margin-bottom: 30px; }
        .summary-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; }
        .summary-card { text-align: center; padding: 20px; border-radius: 10px; color: white; }
        .summary-value { font-size: 2.5em; font-weight: 700; }
        .agents-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(400px, 1fr)); gap: 25px; }
        .agent-card { background: white; border-radius: 15px; padding: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
        .agent-header { display: flex; align-items: center; margin-bottom: 20px; padding-bottom: 15px; border-bottom: 2px solid #f0f0f0; }
        .agent-icon { width: 50px; height: 50px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 28px; margin-right: 15px; background: #f0f0f0; }
        .metrics { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .metric { text-align: center; padding: 10px; background: #f8f9fa; border-radius: 8px; }
        .metric-value { font-size: 1.5em; font-weight: 700; color: #2c3e50; }
        .btn { padding: 14px; background: #3498db; color: white; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; width: 100%; margin-top: 10px; }
        .lead-item { background: #f8f9fa; padding: 12px; margin-bottom: 8px; border-left: 4px solid #3498db; border-radius: 8px; cursor: pointer; position: relative; }
        .lead-item:hover { background: #e3f2fd; }
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); align-items: center; justify-content: center; z-index: 1000; }
        .modal-overlay.active { display: flex; }
        .modal-content { background: white; max-width: 600px; width: 90%; border-radius: 15px; padding: 25px; max-height: 90vh; overflow-y: auto; }
        .no-leads { color: #999; font-style: italic; padding: 15px; text-align: center; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Junk Removal Lead Generator</h1>
            <p>Scanning Live Sources: Craigslist, Reddit, Facebook, Real Estate & More (Ohio • Southern Indiana • Dayton • Kentucky)</p>
        </div>

        <div class="dashboard-summary">
            <div class="summary-grid">
                <div class="summary-card" style="background: linear-gradient(135deg,#667eea,#764ba2);"><div class="summary-value" id="totalLeads">0</div><div class="summary-label">Total Leads Today</div></div>
                <div class="summary-card" style="background: linear-gradient(135deg,#f093fb,#f5576c);"><div class="summary-value" id="hotLeads">0</div><div class="summary-label">Hot Leads</div></div>
                <div class="summary-card" style="background: linear-gradient(135deg,#4facfe,#00f2fe);"><div class="summary-value" id="activeAgents">6</div><div class="summary-label">Active Agents</div></div>
                <div class="summary-card" style="background: linear-gradient(135deg,#43e97b,#38f9d7);"><div class="summary-value" id="conversionRate">0%</div><div class="summary-label">Est. Conversion</div></div>
            </div>
        </div>

        <div class="agents-grid" id="agentsGrid"></div>
    </div>

    <!-- LEAD MODAL -->
    <div class="modal-overlay" id="leadModal">
        <div class="modal-content">
            <h2 id="modalName"></h2>
            <p><strong>Description:</strong> <span id="modalDesc"></span></p>
            <p><strong>Address:</strong> <span id="modalAddress"></span></p>
            <p><strong>Phone:</strong> <a id="modalPhone" href="#"></a></p>
            <p><strong>Email:</strong> <a id="modalEmail" href="#"></a></p>
            <p><strong>Source:</strong> <a id="modalSourceLink" href="#" target="_blank" style="color:#3498db;text-decoration:underline;"></a></p>
            <p><strong>Status:</strong> <span id="modalStatus" style="font-weight:600;color:#28a745;">New</span></p>
            <button id="contactBtn" style="margin:15px 0;padding:12px 24px;background:#28a745;color:white;border:none;border-radius:8px;font-weight:600;cursor:pointer;width:100%;">Mark as Contacted</button>
            <button onclick="closeModal()" style="padding:10px 20px;background:#dc3545;color:white;border:none;border-radius:8px;">Close</button>
        </div>
    </div>

    <script>
        let agents = {
            realEstate: { name: "Real Estate Monitor", icon: "🏠", query: "(\"I need junk removed\" OR \"need someone to haul my junk\" OR \"looking for junk removal\" OR \"haul away my junk\" OR \"estate cleanout needed\" OR \"moving junk removal\" OR \"someone remove my trash\") (Ohio OR Dayton OR Cincinnati OR Kentucky OR \"southern Indiana\") -\"we offer\" -service -company -\"junk removal service\" -business -\"call us\"", scans: 0, leads: 0, hot: 0, leadsList: [] },
            socialMedia: { name: "Social Media Scanner", icon: "📱", query: "(\"anyone haul my junk\" OR \"need junk removed\" OR \"recommend junk hauler\" OR \"looking for someone to remove junk\" OR \"junk removal help\" OR \"pickup my trash\") (Ohio OR Dayton OR Kentucky OR \"southern Indiana\") (facebook.com OR reddit.com) -\"we offer\" -service -company -business", scans: 0, leads: 0, hot: 0, leadsList: [] },
            marketplace: { name: "Marketplace Hunter", icon: "🛒", query: "(\"junk removal needed\" OR \"need junk hauled\" OR \"haul away junk\" OR \"remove my junk\" OR \"trash removal help\") (Ohio OR Dayton OR Kentucky OR \"southern Indiana\") (craigslist.org OR facebook.com/marketplace) -\"we offer\" -service -company -business", scans: 0, leads: 0, hot: 0, leadsList: [] },
            eventSeason: { name: "Event & Seasonal Tracker", icon: "📅", query: "(\"spring cleaning junk\" OR \"moving junk removal\" OR \"estate sale junk\" OR \"garage cleanout needed\" OR \"need junk hauled\") (Ohio OR Dayton OR Kentucky OR Indiana) -\"we offer\" -service -company -business", scans: 0, leads: 0, hot: 0, leadsList: [] },
            craigslist: { name: "Craigslist Scanner", icon: "📰", query: "(\"need junk removed\" OR \"junk haul\" OR \"remove my junk\" OR \"trash hauled\" OR \"scrap removal needed\") (dayton OR cincinnati OR \"southern ohio\" OR kentucky) site:craigslist.org -\"we offer\" -service -company -business", scans: 0, leads: 0, hot: 0, leadsList: [] }
        };

        let currentLeadId = null;

        function loadData() {
            const saved = localStorage.getItem('junkLeadsData');
            if (saved) agents = JSON.parse(saved);
        }

        function saveData() {
            localStorage.setItem('junkLeadsData', JSON.stringify(agents));
        }

        function getSortedLeads(key) {
            return [...agents[key].leadsList].sort((a, b) => b.createdAt - a.createdAt);
        }

        function renderAgents() {
            const grid = document.getElementById('agentsGrid');
            grid.innerHTML = '';
            Object.keys(agents).forEach(key => {
                const a = agents[key];
                const card = document.createElement('div');
                card.className = 'agent-card';
                card.innerHTML = `
                    <div class="agent-header">
                        <div class="agent-icon">${a.icon}</div>
                        <div><h3>${a.name}</h3><span class="status" style="background:#d4edda;color:#155724;padding:5px 12px;border-radius:20px;font-size:0.8em;">Active</span></div>
                    </div>
                    <div class="metrics">
                        <div class="metric"><div class="metric-value" id="${key}-scans">${a.scans}</div><div class="metric-label">Scans</div></div>
                        <div class="metric"><div class="metric-value" id="${key}-leads">${a.leads}</div><div class="metric-label">Leads</div></div>
                        <div class="metric"><div class="metric-value" id="${key}-hot">${a.hot}</div><div class="metric-label">Hot</div></div>
                    </div>
                    <button class="btn" onclick="scanAgent('${key}')">Scan Now</button>
                    <div class="leads-section" id="${key}-leads-section"></div>
                `;
                grid.appendChild(card);
                renderLeadsForAgent(key);
            });
        }

        function renderLeadsForAgent(key) {
            const section = document.getElementById(`${key}-leads-section`);
            section.innerHTML = '<h4 style="margin:10px 0 5px;color:#555;">Latest Leads:</h4>';
            const sorted = getSortedLeads(key);
            if (sorted.length === 0) {
                section.innerHTML += '<p class="no-leads">No leads yet. Click "Scan Now" to start finding customers!</p>';
                return;
            }
            sorted.forEach(lead => {
                const div = document.createElement('div');
                div.className = 'lead-item';
                div.innerHTML = `${lead.hot ? '🔥 ' : ''}<strong>${lead.name}</strong> – ${lead.description.substring(0,80)}${lead.description.length > 80 ? '...' : ''}`;
                div.onclick = () => showLeadModal(lead);
                section.appendChild(div);
            });
        }

        function updateAgentUI(key) {
            const a = agents[key];
            a.leads = a.leadsList.length;
            a.hot = a.leadsList.filter(l => l.hot).length;
            document.getElementById(`${key}-scans`).textContent = a.scans;
            document.getElementById(`${key}-leads`).textContent = a.leads;
            document.getElementById(`${key}-hot`).textContent = a.hot;
            renderLeadsForAgent(key);
        }

        function updateGlobalSummary() {
            let total = 0, hot = 0;
            Object.values(agents).forEach(a => { total += a.leads; hot += a.hot; });
            document.getElementById('totalLeads').textContent = total;
            document.getElementById('hotLeads').textContent = hot;
        }

        async function scanAgent(key) {
            const btn = event.target;
            const originalText = btn.textContent;
            btn.disabled = true;
            btn.textContent = 'Scanning...';

            try {
                const searchRes = await fetch('/search-lead', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ action: 'search', data: { query: agents[key].query } })
                });
                const searchData = await searchRes.json();

                const prompt = `Extract ONLY real individual customers (homeowners/renters) asking for junk removal. Ignore all businesses, companies, services, or ads. Return ONLY JSON array with: name, phone, email, address, description, source (full URL), hot (true if urgent). Data: ${JSON.stringify(searchData.content || [])}`;

                const extractRes = await fetch('/search-lead', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ action: 'extract', data: { messages: [{ role: "user", content: prompt }] } })
                });
                const extractData = await extractRes.json();

                let newLeads = [];
                try { newLeads = JSON.parse(extractData.content[0].text || '[]'); } catch(e) { newLeads = []; }

                newLeads = newLeads.filter(lead => {
                    const text = (lead.description + (lead.source || '')).toLowerCase();
                    return !text.includes('we offer') && !text.includes('junk removal service') && !text.includes('company') && !text.includes('business');
                });

                newLeads.forEach(lead => {
                    lead.id = `lead-${Date.now()}-${Math.random().toString(36).slice(2)}`;
                    lead.contacted = false;
                    lead.createdAt = Date.now();
                    lead.agent = key;
                    lead.hot = !!lead.hot;
                });

                agents[key].leadsList = [...agents[key].leadsList, ...newLeads];
                agents[key].scans++;

                saveData();
                updateAgentUI(key);
                updateGlobalSummary();
            } catch(e) {
                alert("Scan failed – check API keys in Render Environment");
            }

            btn.disabled = false;
            btn.textContent = originalText;
        }

        function showLeadModal(lead) {
            currentLeadId = lead.id;
            document.getElementById('modalName').textContent = lead.name;
            document.getElementById('modalDesc').textContent = lead.description;
            document.getElementById('modalAddress').textContent = lead.address || 'N/A';

            const phoneLink = document.getElementById('modalPhone');
            phoneLink.textContent = lead.phone || 'N/A';
            phoneLink.href = lead.phone && lead.phone !== "N/A" ? `tel:${lead.phone}` : "#";

            const emailLink = document.getElementById('modalEmail');
            emailLink.textContent = lead.email || 'N/A';
            emailLink.href = lead.email && lead.email !== "N/A" ? `mailto:${lead.email}` : "#";

            const sourceLink = document.getElementById('modalSourceLink');
            sourceLink.textContent = lead.source || 'N/A';
            sourceLink.href = lead.source && lead.source.startsWith('http') ? lead.source : '#';

            document.getElementById('modalStatus').textContent = lead.contacted ? 'Contacted' : 'New';
            document.getElementById('modalStatus').style.color = lead.contacted ? '#dc3545' : '#28a745';

            const contactBtn = document.getElementById('contactBtn');
            contactBtn.textContent = lead.contacted ? 'Mark as New' : 'Mark as Contacted';
            contactBtn.onclick = toggleContacted;

            document.getElementById('leadModal').classList.add('active');
        }

        function toggleContacted() { /* unchanged from your previous working version */ }
        function closeModal() { document.getElementById('leadModal').classList.remove('active'); }

        async function updateDashboard() {
            try {
                const res = await fetch('/api/stats');
                const data = await res.json();
                document.getElementById('totalLeads').textContent = data.totalLeads;
                document.getElementById('hotLeads').textContent = data.hotLeads;
                document.getElementById('activeAgents').textContent = data.activeAgents;
                document.getElementById('conversionRate').textContent = data.conversionRate + '%';
            } catch(e) {}
        }

        // INIT
        loadData();
        renderAgents();
        Object.keys(agents).forEach(key => updateAgentUI(key));
        updateGlobalSummary();
        updateDashboard();
        setInterval(updateDashboard, 30000);
    </script>
</body>
</html>
